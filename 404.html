<title>Hammad Crypto</title>
<script>
// GitHub Pages SPA redirect fix
// Converts /HammadCrypto/some/path to /HammadCrypto/?/some/path
// so the main index.html can handle it
var l = window.location;
var path = l.pathname.slice(1); // remove leading /
// Store the path in sessionStorage and redirect to root
sessionStorage.setItem('spa_redirect', l.pathname + l.search + l.hash);
l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/HammadCrypto/');
</script>
</head>

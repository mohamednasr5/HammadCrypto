<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hammad Crypto Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#06080f;
  --bg-secondary:#0c1018;
  --bg-card:#111827;
  --bg-card-hover:#162032;
  --bg-input:#0a0f1a;
  --border-subtle:#1e293b;
  --border-active:#334155;
  --accent:#10b981;
  --accent-dim:rgba(16,185,129,0.12);
  --accent-glow:rgba(16,185,129,0.25);
  --gold:#f59e0b;
  --gold-dim:rgba(245,158,11,0.12);
  --danger:#ef4444;
  --danger-dim:rgba(239,68,68,0.12);
  --info:#3b82f6;
  --info-dim:rgba(59,130,246,0.12);
  --purple:#8b5cf6;
  --purple-dim:rgba(139,92,246,0.12);
  --cyan:#06b6d4;
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-muted:#475569;
  --radius:12px;
  --radius-sm:8px;
  --radius-xs:6px;
  --shadow-card:0 4px 24px rgba(0,0,0,0.3);
  --shadow-glow:0 0 20px rgba(16,185,129,0.15);
  --transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-primary);color:var(--text-primary);font-family:'Cairo','Segoe UI',Tahoma,sans-serif}
body{display:flex;flex-direction:column}

/* ══════════ HEADER ══════════ */
#hdr{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:linear-gradient(180deg,rgba(12,16,24,0.95),rgba(6,8,15,0.98));
  border-bottom:1px solid var(--border-subtle);
  position:relative;z-index:10;
}
#hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.3;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-ico{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#059669);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;color:#fff;
  box-shadow:0 4px 12px rgba(16,185,129,0.3);
  position:relative;overflow:hidden;
}
.logo-ico::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
  border-radius:10px;
}
.logo-txt{
  font-size:15px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:0.3px;
}
.logo-ver{font-size:9px;color:var(--text-muted);font-weight:600;margin-right:2px}
.hdr-actions{display:flex;align-items:center;gap:8px}
.status-badge{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;
  padding:4px 10px;border-radius:20px;
  transition:var(--transition);
}
.status-badge.connected{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(16,185,129,0.3)}
.status-badge.disconnected{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-badge.connected .status-dot{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:statusPulse 2s infinite}
.status-badge.disconnected .status-dot{background:var(--danger)}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.4}}
.ico-btn{
  background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-xs);
  width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--text-secondary);transition:var(--transition);
}
.ico-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════ COINS BAR ══════════ */
#coins-bar{
  flex-shrink:0;
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border-subtle);
  padding:8px 12px;
  display:flex;flex-wrap:wrap;gap:6px;
  overflow-x:auto;overflow-y:hidden;
}
#coins-bar::-webkit-scrollbar{height:2px}
#coins-bar::-webkit-scrollbar-thumb{background:var(--border-active);border-radius:1px}
.coin-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-xs);padding:5px 10px;
  white-space:nowrap;transition:var(--transition);flex-shrink:0;
}
.coin-pill:hover{border-color:var(--accent);background:var(--accent-dim);transform:translateY(-1px)}
.cp-sym{font-size:11px;font-weight:700;color:var(--text-primary);min-width:32px}
.cp-price{font-size:10px;color:var(--text-secondary)}
.cp-chg{font-size:10px;font-weight:700;min-width:42px;text-align:right}
.cp-chg.up{color:var(--accent)}.cp-chg.dn{color:var(--danger)}

/* ══════════ TABS ══════════ */
#tabs{
  flex-shrink:0;display:flex;
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border-subtle);
}
.tab{
  flex:1;padding:10px 4px;text-align:center;
  font-size:10px;color:var(--text-muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:var(--transition);
  user-select:none;display:flex;flex-direction:column;align-items:center;gap:2px;
  position:relative;
}
.tab:hover:not(.on){color:var(--text-secondary);background:rgba(255,255,255,0.02)}
.tab.on{border-bottom-color:var(--accent);color:var(--accent);background:rgba(16,185,129,0.04)}
.tab-ico{font-size:16px;line-height:1}
.tab-lbl{font-size:9px;font-weight:700;letter-spacing:0.3px}

/* ══════════ CONTENT ══════════ */
#content{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg-primary)}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--border-active);border-radius:2px}
.page{display:none}.page.on{display:block;animation:pageIn .35s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ══════════ HOME PAGE ══════════ */
.port-card{
  margin:14px 12px 10px;
  background:linear-gradient(145deg,var(--bg-card),#0f172a);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow-card);
  position:relative;overflow:hidden;
}
.port-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--cyan),var(--accent));
  opacity:0.6;
}
.port-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.port-total-lbl{font-size:11px;color:var(--text-secondary);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
.port-total{font-size:30px;font-weight:900;color:#fff;line-height:1.1}
.port-egp{font-size:12px;color:var(--gold);margin-top:6px;font-weight:600}
.port-badge{
  background:var(--accent-dim);
  border:1px solid rgba(16,185,129,0.3);
  border-radius:var(--radius-sm);padding:8px 14px;text-align:center;
}
.pb-lbl{font-size:9px;color:var(--text-secondary);font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.pb-val{font-size:17px;font-weight:900;color:var(--accent);margin-top:2px}

/* Stat Cards */
.port-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ps{
  background:var(--bg-primary);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);padding:12px;
  transition:var(--transition);position:relative;overflow:hidden;
}
.ps:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-glow)}
.ps-lbl{font-size:9px;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700}
.ps-val{font-size:15px;font-weight:900;white-space:nowrap}

/* Assets Section */
.assets-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px 6px;
}
.assets-hdr-txt{font-size:11px;font-weight:800;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.8px}
.badge-sm{
  font-size:9px;background:var(--accent-dim);
  border:1px solid rgba(16,185,129,0.3);
  border-radius:var(--radius-xs);padding:3px 10px;color:var(--accent);
  font-weight:700;
}

.asset-row{
  display:grid;grid-template-columns:42px 1fr auto;
  gap:12px;align-items:center;
  padding:12px 14px;
  border-bottom:1px solid rgba(30,41,59,0.5);
  transition:var(--transition);position:relative;
}
.asset-row:hover{background:rgba(16,185,129,0.03);padding-right:18px}
.asset-row::after{
  content:'';position:absolute;right:0;top:0;height:100%;width:3px;
  background:linear-gradient(180deg,transparent,var(--accent),transparent);
  opacity:0;transition:var(--transition);
}
.asset-row:hover::after{opacity:1}

.ar-ico{
  width:42px;height:42px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;border:2px solid;
  flex-shrink:0;position:relative;
  transition:var(--transition);
}
.ar-ico::before{
  content:'';position:absolute;inset:0;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  pointer-events:none;
}
.asset-row:hover .ar-ico{transform:scale(1.08)}
.ar-mid{min-width:0}
.ar-sym{font-size:13px;font-weight:800;color:var(--text-primary);letter-spacing:0.3px}
.ar-sub{font-size:9px;color:var(--text-secondary);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ar-bar{height:3px;background:var(--border-subtle);border-radius:2px;margin-top:5px;overflow:hidden}
.ar-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width .8s ease}

.ar-right{text-align:left;flex-shrink:0;padding:0 4px}
.ar-val{font-size:13px;font-weight:800;color:var(--text-primary)}
.ar-pnl{font-size:10px;margin-top:2px;font-weight:700}
.ar-day{font-size:9px;color:var(--text-muted);margin-top:2px}

.green{color:var(--accent)}.red{color:var(--danger)}.gold{color:var(--gold)}

/* ══════════ AI PAGE ══════════ */
.ai-top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  background:linear-gradient(90deg,var(--purple-dim),var(--accent-dim));
  border-bottom:1px solid var(--border-subtle);
}
.ai-title{font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px}
.ai-badge-pill{
  background:linear-gradient(135deg,var(--purple),#6366f1);
  border-radius:var(--radius-xs);padding:4px 10px;font-size:9px;font-weight:800;color:#fff;
  box-shadow:0 4px 12px rgba(139,92,246,0.3);
}
.ai-last{font-size:9px;color:var(--text-secondary)}
.btn-ai-run{
  background:linear-gradient(135deg,var(--accent),#059669);
  border:none;border-radius:var(--radius-sm);padding:7px 14px;
  font-size:10px;font-weight:800;color:#fff;cursor:pointer;
  transition:var(--transition);white-space:nowrap;
  box-shadow:0 4px 15px rgba(16,185,129,0.3);
  font-family:'Cairo',sans-serif;
}
.btn-ai-run:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(16,185,129,0.4)}
.btn-ai-run:active{transform:translateY(0)}
.btn-ai-run:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* AI Card */
.ai-card{
  margin:10px 12px;
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow-card);transition:var(--transition);
  position:relative;
}
.ai-card:hover{border-color:var(--accent);box-shadow:var(--shadow-glow)}
.ai-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:var(--transition);
}
.ai-card:hover::before{opacity:1}

.ai-card-hdr{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  background:rgba(0,0,0,0.15);
  border-bottom:1px solid var(--border-subtle);
}
.ai-card-ico{
  width:38px;height:38px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;border:2px solid;flex-shrink:0;
  transition:var(--transition);position:relative;
}
.ai-card-ico::before{
  content:'';position:absolute;inset:0;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  pointer-events:none;
}
.ai-card:hover .ai-card-ico{transform:scale(1.1)}
.ai-sym{font-size:14px;font-weight:800;letter-spacing:0.3px}
.ai-price{font-size:10px;color:var(--text-secondary);margin-top:2px}
.sig{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:var(--radius-xs);padding:5px 12px;font-size:10px;font-weight:800;
  margin-right:auto;margin-left:auto;
}
.sig.buy{background:var(--accent-dim);border:1px solid rgba(16,185,129,0.4);color:var(--accent)}
.sig.hold{background:var(--gold-dim);border:1px solid rgba(245,158,11,0.4);color:var(--gold)}
.sig.sell{background:var(--danger-dim);border:1px solid rgba(239,68,68,0.4);color:var(--danger)}

.ai-body{padding:16px;position:relative}
.ai-reason{font-size:11px;color:var(--text-secondary);line-height:1.7;margin-bottom:12px;padding:10px 12px;background:var(--bg-primary);border-right:3px solid var(--accent);border-radius:var(--radius-xs)}

.ai-scores{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sc{
  background:var(--bg-primary);border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);padding:10px;text-align:center;
  transition:var(--transition);
}
.sc:hover{border-color:var(--accent)}
.sc-l{font-size:8px;color:var(--text-muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.sc-v{font-size:16px;font-weight:900}
.sc-bar{height:3px;background:var(--border-subtle);border-radius:2px;margin-top:5px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width .6s ease}

.ai-levels{
  display:flex;gap:10px;flex-wrap:wrap;font-size:10px;
  background:var(--bg-primary);border-radius:var(--radius-sm);padding:10px;
  border:1px solid var(--border-subtle);
}
.ai-lv-item{display:flex;align-items:center;gap:5px;flex:1;min-width:90px}
.ai-lv-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ══════════ SHARED ══════════ */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:12px}
.spinner{
  width:36px;height:36px;
  border:3px solid var(--border-subtle);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
.ld-txt{font-size:12px;color:var(--text-secondary);font-weight:600}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px;line-height:1.7}
.footer{text-align:center;padding:16px;color:var(--text-muted);font-size:9px;border-top:1px solid var(--border-subtle);margin-top:8px;line-height:1.8}

/* ══════════ ALERTS ══════════ */
.al-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;border-bottom:1px solid var(--border-subtle);
}
.al-hdr-txt{font-size:13px;font-weight:800}
.al-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;
  border-bottom:1px solid var(--border-subtle);
  transition:var(--transition);
}
.al-item:hover{background:rgba(255,255,255,0.02)}
.al-dot-el{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.al-ttl{font-size:12px;font-weight:700;color:var(--text-primary)}
.al-msg{font-size:10px;color:var(--text-secondary);margin-top:3px;line-height:1.5}
.al-time{font-size:9px;color:var(--text-muted);margin-top:3px}
.al-item.unread{background:var(--accent-dim);border-right:3px solid var(--accent)}
.btn-sm-clear{
  background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:var(--radius-xs);padding:5px 12px;font-size:10px;
  color:var(--text-secondary);cursor:pointer;transition:var(--transition);
  font-family:'Cairo',sans-serif;font-weight:600;
}
.btn-sm-clear:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-dim)}

/* ══════════ SETTINGS ══════════ */
.settings-section{
  display:block;border:1px solid var(--border-subtle);
  border-radius:var(--radius);padding:16px;margin:12px;
  background:var(--bg-card);position:relative;overflow:hidden;
}
.settings-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.settings-section.api-section::before{background:linear-gradient(90deg,var(--accent),var(--cyan))}
.settings-section.ticker-section::before{background:linear-gradient(90deg,var(--info),var(--cyan))}

.settings-title{
  font-size:12px;font-weight:800;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.settings-title .icon{font-size:16px}
.api-status{
  display:inline-flex;align-items:center;gap:4px;
  font-size:9px;font-weight:700;padding:3px 8px;
  border-radius:20px;margin-right:auto;
}
.api-status.saved{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(16,185,129,0.3)}
.api-status.not-saved{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}

.inp{
  width:100%;background:var(--bg-input);border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);padding:10px 12px;color:var(--text-primary);
  font-size:12px;margin-bottom:10px;direction:ltr;
  outline:none;transition:var(--transition);
  font-family:'Cairo',monospace;
}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.inp::placeholder{color:var(--text-muted)}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.btn{
  border:none;border-radius:var(--radius-sm);padding:9px 16px;font-size:11px;
  font-weight:700;cursor:pointer;transition:var(--transition);
  font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:5px;
}
.btn-green{background:linear-gradient(135deg,var(--accent),#059669);color:#fff;box-shadow:0 4px 15px rgba(16,185,129,0.3)}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(16,185,129,0.4)}
.btn-green:active{transform:translateY(0)}
.btn-gray{background:var(--bg-primary);border:1px solid var(--border-subtle);color:var(--text-secondary)}
.btn-gray:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:var(--danger-dim);border:1px solid rgba(239,68,68,0.4);color:var(--danger)}
.btn-red:hover{background:rgba(239,68,68,0.2)}

.conn-msg{
  margin-top:10px;padding:8px 12px;border-radius:var(--radius-xs);
  font-size:11px;font-weight:600;transition:var(--transition);
  display:none;
}
.conn-msg.ok{display:block;background:var(--accent-dim);border:1px solid rgba(16,185,129,0.3);color:var(--accent)}
.conn-msg.fail{display:block;background:var(--danger-dim);border:1px solid rgba(239,68,68,0.3);color:var(--danger)}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-active);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="logo">
    <div class="logo-ico">₿</div>
    <div>
      <span class="logo-txt">HAMMAD CRYPTO</span>
      <span class="logo-ver">Pro</span>
    </div>
  </div>
  <div class="hdr-actions">
    <div class="status-badge disconnected" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">غير متصل</span>
    </div>
    <button class="ico-btn" id="refreshBtn" title="تحديث">↻</button>
  </div>
</div>

<!-- COINS BAR -->
